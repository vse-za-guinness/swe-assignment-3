<!DOCTYPE html>
<html>
<head>
  <title>Shopping List</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; }
    form { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type=text] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    button { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
    .purchased span { text-decoration: line-through; color: #999; }
    a { color: #4f46e5; text-decoration: none; font-size: 0.9rem; }
    a.del { color: #e53e3e; }
  </style>
</head>
<body>
  <h1>Shopping List (redeployment testing purposes)</h1>
  <form action="/add" method="post">
    <input type="text" name="name" placeholder="Add an item..." required>
    <button type="submit">Add</button>
  </form>
  <ul>
    {% for item in items %}
    <li class="{{ 'purchased' if item.purchased }}">
      <span>{{ item.name }}</span>
      <a href="/toggle/{{ item.id }}">{{ '✓ Undo' if item.purchased else 'Mark bought' }}</a>
      <a href="/delete/{{ item.id }}" class="del">Delete</a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
